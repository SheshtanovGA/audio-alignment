<fieldset>
  <legend>Session / cache</legend>
  <label>session <input type="text" name="session" placeholder="e.g. session3"></label>
  <label>cache_dir <input type="text" name="cache_dir" value="{{ defaults.CACHE_DIR }}"></label>
  <p class="hint">Or upload / set paths for each artifact:</p>
  {% for name in defaults.ALIGNMENT_ARTIFACT_NAMES %}
    <label>{{ name }} <input type="file" name="{{ name }}" accept=".npy"></label>
    <label>Or {{ name }} path <input type="text" name="{{ name }}_path" placeholder="cache/session/{{ name }}.npy"></label>
  {% endfor %}
</fieldset>
